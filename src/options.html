<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Application Autofill Profile</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        background: #f7f8fa;
        color: #151922;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 24px;
      }

      header {
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #4c5666;
      }

      form {
        display: grid;
        gap: 18px;
      }

      section {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px 16px;
        padding: 18px;
        border: 1px solid #d6dce6;
        border-radius: 8px;
        background: #ffffff;
      }

      h2 {
        grid-column: 1 / -1;
        margin: 0;
        font-size: 16px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
      }

      input,
      select {
        border: 1px solid #c9d0dc;
        border-radius: 6px;
        font: inherit;
        font-weight: 400;
        padding: 8px 9px;
      }

      label.checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      label.checkbox input {
        width: auto;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 1px solid #c9d0dc;
        border-radius: 6px;
        background: #ffffff;
        color: #151922;
        cursor: pointer;
        font: inherit;
        padding: 9px 14px;
      }

      button.primary {
        background: #1f6feb;
        border-color: #1f6feb;
        color: #ffffff;
      }

      #status {
        min-height: 20px;
        color: #1f6feb;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Profile</h1>
        <p>Local profile data used for user-triggered autofill.</p>
      </header>

      <form id="profileForm">
        <section>
          <h2>Contact</h2>
          <label>First name<input name="firstName" autocomplete="given-name"></label>
          <label>Last name<input name="lastName" autocomplete="family-name"></label>
          <label>Email<input name="email" type="email" autocomplete="email"></label>
          <label>Phone<input name="phone" type="tel" autocomplete="tel"></label>
          <label>Phone country code<input name="phoneCountryCode" type="tel" autocomplete="tel-country-code"></label>
          <label>Phone local number<input name="phoneLocalNumber" type="tel" autocomplete="tel-national"></label>
          <label>Street address<input name="streetAddress" autocomplete="street-address"></label>
          <label>Postal code<input name="postalCode" autocomplete="postal-code"></label>
          <label>City<input name="city" autocomplete="address-level2"></label>
          <label>Country<input name="country" autocomplete="country-name"></label>
          <label>LinkedIn<input name="linkedin" type="url"></label>
        </section>

        <section>
          <h2>Application Profile</h2>
          <label>Title<input name="title"></label>
          <label>Name suffix<input name="nameSuffix"></label>
          <label>Highest degree<input name="highestDegree"></label>
          <label>Field of study<input name="fieldOfStudy"></label>
          <label>University<input name="university"></label>
          <label>German level<input name="germanLevel"></label>
          <label>English level<input name="englishLevel"></label>
          <label>Availability date<input name="availabilityDate" type="date"></label>
          <label>Notice period or start date<input name="noticePeriodOrStartDate"></label>
          <label>Work authorization<input name="workAuthorization"></label>
          <label>Location preference 1<input name="locationPreference1"></label>
          <label>Location preference 2<input name="locationPreference2"></label>
          <label>Travel readiness<input name="travelReadiness"></label>
          <label>Salary expectation<input name="salaryExpectation"></label>
          <label class="checkbox"><input name="requiresSponsorship" type="checkbox"> Requires sponsorship</label>
        </section>

        <section>
          <h2>Optional Sensitive Fields</h2>
          <label>Birth date<input name="birthDate" type="date"></label>
          <label>
            Gender
            <select name="gender">
              <option value="">Not stored</option>
              <option value="Female">Female</option>
              <option value="Male">Male</option>
              <option value="Diverse">Diverse</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </label>
          <label>Nationality<input name="nationality"></label>
          <label>
            Talent pool consent
            <select name="talentPoolConsent">
              <option value="">Not stored</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </label>
          <label>
            Disability / equal-status field
            <select name="disabilityStatus">
              <option value="">Not stored</option>
              <option value="No">No</option>
              <option value="Yes">Yes</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
          </label>
        </section>

        <section>
          <h2>Settings</h2>
          <label class="checkbox"><input name="allowOverwrite" type="checkbox"> Allow overwriting non-empty fields</label>
        </section>

        <div class="actions">
          <button class="primary" type="submit">Save profile</button>
          <button id="clearProfile" type="button">Clear profile</button>
        </div>
        <div id="status" aria-live="polite"></div>
      </form>
    </main>

    <script src="storage.js"></script>
    <script src="options.js"></script>
  </body>
</html>
