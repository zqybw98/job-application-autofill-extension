<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Application Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        background: #f7f8fa;
        color: #151922;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 24px;
      }

      h2 {
        margin: 0;
        font-size: 16px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
        margin-bottom: 18px;
      }

      .stat {
        border: 1px solid #d6dce6;
        border-radius: 8px;
        background: #ffffff;
        padding: 14px;
      }

      .stat strong {
        display: block;
        margin-top: 6px;
        font-size: 24px;
      }

      section {
        border: 1px solid #d6dce6;
        border-radius: 8px;
        background: #ffffff;
        padding: 18px;
        margin-bottom: 18px;
      }

      form {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px 16px;
        margin-top: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
      }

      input,
      select {
        border: 1px solid #c9d0dc;
        border-radius: 6px;
        font: inherit;
        font-weight: 400;
        padding: 8px 9px;
      }

      .actions {
        align-self: end;
        display: flex;
        gap: 10px;
      }

      button {
        border: 1px solid #c9d0dc;
        border-radius: 6px;
        background: #ffffff;
        color: #151922;
        cursor: pointer;
        font: inherit;
        padding: 9px 14px;
      }

      button.primary {
        background: #1f6feb;
        border-color: #1f6feb;
        color: #ffffff;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 14px;
      }

      th,
      td {
        border-bottom: 1px solid #e3e7ef;
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        font-size: 12px;
        text-transform: uppercase;
        color: #4c5666;
      }

      td a {
        color: #1f6feb;
      }

      .empty {
        color: #4c5666;
        padding: 14px 0 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Application Dashboard</h1>

      <div class="stats" aria-label="Application counters">
        <div class="stat">Total<strong data-stat="total">0</strong></div>
        <div class="stat">Applied<strong data-stat="applied">0</strong></div>
        <div class="stat">Interviewing<strong data-stat="interviewing">0</strong></div>
        <div class="stat">Offered<strong data-stat="offered">0</strong></div>
        <div class="stat">Rejected<strong data-stat="rejected">0</strong></div>
        <div class="stat">Response rate<strong data-stat="responseRate">0%</strong></div>
      </div>

      <section>
        <h2>Save Application</h2>
        <form id="applicationForm">
          <label>Company<input name="company" required></label>
          <label>Role<input name="role" required></label>
          <label>URL<input name="url" type="url"></label>
          <label>Platform<input name="platform"></label>
          <label>Status
            <select name="status">
              <option value="draft">draft</option>
              <option value="applied">applied</option>
              <option value="interviewing">interviewing</option>
              <option value="offered">offered</option>
              <option value="rejected">rejected</option>
            </select>
          </label>
          <div class="actions">
            <button class="primary" type="submit">Save</button>
            <button id="clearForm" type="button">Clear</button>
          </div>
        </form>
      </section>

      <section>
        <h2>Recent Applications</h2>
        <div id="emptyState" class="empty">No applications saved yet.</div>
        <table id="applicationsTable" hidden>
          <thead>
            <tr>
              <th>Company</th>
              <th>Role</th>
              <th>Platform</th>
              <th>Status</th>
              <th>Updated</th>
              <th>URL</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <script src="storage.js"></script>
    <script src="applicationTracker.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
